# Javascript Node CircleCI 2.0 configuration file
#
# Check https://circleci.com/docs/2.0/language-javascript/ for more details
#
version: 2
jobs:
  build:
    docker:
      # specify the version you desire here
      - image: cibuilds/hugo:0.74

    working_directory: ~/hugo
    environment:
      HUGO_BUILD_DIR: ~/hugo/public

    steps:
      # install stuffs
      - run: apk add --update git rsync nodejs nodejs-npm
      # https://github.com/npm/npm/issues/20861
      #- run: npm config set unsafe-perm true
      #- run: npm install -g postcss-cli autoprefixer

      # checkout the repo
      - checkout

      - run: hugo version
      - run: HUGO_ENV=production hugo -v --minify

      - deploy:
          name: "Deploy via Rsync"
          command: rsync -Pav -e "ssh -i ${DEPLOY_ID_FILE}" ${HUGO_BUILD_DIR} ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_DES_DIR}
